name: win

# §8.7 Windows first-class end-to-end: a NATIVE MSVC build of the localhost
# fake-hardware stack (harp-deviced + the shell/host) running the deterministic
# offline-golden bounce over TCP — the Windows analogue of eth.yml. Built up
# incrementally so main stays green: this first lands the device build under MSVC,
# then adds the host shells (libusb-win) and the e2e steps.
#
# windows-2022 (not -latest) for the "Visual Studio 17 2022" generator, matching
# ci.yml's shell-windows job (windows-latest rolled to a VS the generator can't find).
# push+dispatch only for now (no pull_request) while the port iterates to green.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  win:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: build the fake-hardware device (harp-deviced, MSVC)
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config RelWithDebInfo --target harp-deviced
