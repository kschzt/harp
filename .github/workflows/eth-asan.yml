name: eth-asan

# The §8.7 loopback under AddressSanitizer + UBSan on Linux x86_64 — the daemon's
# first-ever sanitizer coverage (its state store, bundle codec, RTP/engine, the meter
# pump start/stop). Linux-only on purpose: macOS/arm64e ASan mis-instruments the
# pthread create/join interceptors under pointer-authentication (a false SEGV in the
# join wrapper that does NOT reproduce without ASan), so the local Mac run isn't a
# valid oracle. This job IS the oracle: a real memory/UB bug in the daemon will fire
# here (and would crash without ASan too); a clean green confirms the Mac SEGV was the
# tooling artifact.
#
# Reliably green on main (the daemon + shell — incl. the §14 diag rings/bundle codec —
# are ASan/UBSan-clean), so it now GATES: pull_request + push to main on the code paths
# that could carry a memory/UB bug (skips docs-only PRs), plus a nightly sweep and manual
# dispatch. This is the daemon's only automated memory-safety gate — keep it green.
on:
  pull_request:
    paths: &asan_paths
      - 'device/**'
      - 'host/**'
      - 'shell/**'
      - 'core/**'
      - 'tools/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - '.github/workflows/eth-asan.yml'
  push:
    branches: [main]
    paths: *asan_paths
  schedule:
    - cron: '17 7 * * *'   # nightly ASan/UBSan sweep regardless of what changed
  workflow_dispatch:

jobs:
  asan:
    runs-on: ubuntu-latest
    timeout-minutes: 40   # ASan-instrumented build + soak is slow; bound a hang
    env:
      ASAN_OPTIONS: detect_leaks=0:print_stacktrace=1:abort_on_error=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: clone VST3 SDK
        run: git clone --depth 1 --recursive
             https://github.com/steinbergmedia/vst3sdk.git external/vst3sdk
      - name: clone CLAP SDK (header-only)
        run: git clone --depth 1 --branch 1.2.8
             https://github.com/free-audio/clap.git external/clap
      - name: install deps (libusb + libsamplerate)
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libsamplerate0-dev
      - name: build harp-deviced + harp-probe (ASan + UBSan)
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build --target harp-deviced harp-probe -j
      - name: build the shell + host (ASan + UBSan)
        run: |
          cmake -B build-vst -S tools/vst3-host -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build-vst --target harp-vst3-host harp-shell -j
      - name: host + shell soak under ASan (save/load/play, host stderr VISIBLE)
        run: |
          ./build/harp-deviced --port 17951 --state-dir /tmp/asan-h-state >/tmp/asan-h-dev.log 2>&1 &
          DP=$!; trap 'kill -9 $DP 2>/dev/null || true' EXIT
          for _ in $(seq 1 25); do grep -q "listening on 17951" /tmp/asan-h-dev.log && break; sleep 0.2; done
          PLUG="$(find build-vst -maxdepth 5 -name harp-shell.vst3 -type d | head -1)"
          echo "── save-state (the recall save render — host/shell ASan stderr is NOT swallowed here):"
          HARP_ETH_DEVICE=127.0.0.1:17951 ./build-vst/harp-vst3-host "$PLUG" \
            --set 3=0.81 --set 7=0.31 --set 1=0.61 --seconds 0.6 --save-state /tmp/asan-h.state
          echo "── load-state + golden notes:"
          HARP_ETH_DEVICE=127.0.0.1:17951 ./build-vst/harp-vst3-host "$PLUG" \
            --load-state /tmp/asan-h.state --notes 62,69,74,65 --seconds 4
          grep -iE "ERROR: AddressSanitizer|runtime error:|SUMMARY: (Address|Undefined)" /tmp/asan-h-dev.log \
            && { echo "::error::daemon ASan/UBSan finding"; exit 1; } || echo "host + daemon clean over save/load/play"
      - name: recall round-trip under ASan (device coverage; exit non-fatal — ASan slows realtime timing)
        run: |
          scripts/recall-eth-test.sh \
            || echo "recall-eth non-pass under ASan (timing-sensitive; the soak above is the host/shell oracle)"
          # grep BOTH the device log and the host load-render log (recall-eth.log) — a
          # sanitizer finding on either side is fatal even though the test's pass/fail is
          # tolerated for ASan timing.
          grep -iE "ERROR: AddressSanitizer|runtime error:|SUMMARY: (Address|Undefined)" \
                 /tmp/recall-eth-dev.log /tmp/recall-eth.log 2>/dev/null \
            && { echo "::error::recall-eth ASan/UBSan finding (device or host)"; exit 1; } \
            || echo "recall-eth device+host clean"
      - name: sustained play soak under ASan (RTP plane + engine + repeated meter-pump start/stop)
        run: |
          ./build/harp-deviced --port 47950 --state-dir /tmp/asan-soak-state >/tmp/asan-soak-dev.log 2>&1 &
          DP=$!; trap 'kill -9 $DP 2>/dev/null || true' EXIT
          for _ in $(seq 1 25); do grep -q "listening on 47950" /tmp/asan-soak-dev.log && break; sleep 0.2; done
          PLUG="$(find build-vst -maxdepth 5 -name harp-shell.vst3 -type d | head -1)"
          : > /tmp/asan-soak-host.log
          for i in 1 2 3 4; do
            echo "── soak cycle $i (notes + 8s play -> engine + meter-pump start/stop)"
            HARP_ETH_DEVICE=127.0.0.1:47950 ./build-vst/harp-vst3-host "$PLUG" \
              --notes 60,64,67,72 --seconds 8 --realtime >>/tmp/asan-soak-host.log 2>&1
            rc=$?
            # Was `|| true`, which swallowed a host crash. ASAN_OPTIONS abort_on_error=1
            # makes a sanitizer finding abort the HOST (rc 134); a hard crash is 139 (SEGV).
            # Those are real bugs and MUST fail. Any other non-zero stays tolerated: ASan
            # slows realtime, so an underrun/timeout exit is expected and not a defect.
            if [ $rc -eq 134 ] || [ $rc -eq 139 ]; then
              echo "::error::host crashed under ASan/UBSan during soak cycle $i (rc=$rc)"
              cat /tmp/asan-soak-host.log; exit 1
            fi
          done
          echo "── ASan/UBSan reports over the soak (device AND host — host was previously ungrepped):"
          if grep -iE "ERROR: AddressSanitizer|runtime error:|SUMMARY: (Address|Undefined)" \
                 /tmp/asan-soak-dev.log /tmp/asan-soak-host.log; then
            echo "::error::ASan/UBSan found issues during the soak"; exit 1
          fi
          echo "device + host ASan/UBSan-clean across the soak"
      - name: corrupt-CBOR fault injection under ASan (host survives a hostile device's bad frames)
        # fatal (unlike recall above): a crash / over-read / UB while decoding corrupt
        # device CBOR is a real bug, not a timing artifact. Uses the ASan build/ + build-vst/.
        run: scripts/corrupt-cbor-eth-test.sh
