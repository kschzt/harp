name: ci
on: [push, pull_request]

jobs:
  shell-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: clone VST3 SDK
        run: git clone --depth 1 --recursive
             https://github.com/steinbergmedia/vst3sdk.git external/vst3sdk
      - name: install libusb + libsamplerate
        run: brew install libusb libsamplerate
      - name: clone CLAP SDK (header-only)
        run: git clone --depth 1 --branch 1.2.8
             https://github.com/free-audio/clap.git external/clap
      - name: build shell + tools
        run: |
          cmake -B build-vst -S tools/vst3-host
          cmake --build build-vst --target harp-vst3-host harp-shell harp-clap clap-host ring-tests registry-tests mpe-zone-tests -j3
      - name: ring + registry + mpe-zone tests (cross-thread stress; registry keying; MPE zone-collapse logic)
        run: |
          ./build-vst/ring-tests
          ./build-vst/registry-tests
          ./build-vst/mpe-zone-tests
      - name: AU shell + auval (Apple's own validation gate)
        run: |
          cmake --build build-vst --target harp-au au-host -j3
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          cp -R "$(find build-vst -name 'harp-au.component' -maxdepth 3 | head -1)" \
                ~/Library/Audio/Plug-Ins/Components/
          codesign --force --deep -s - ~/Library/Audio/Plug-Ins/Components/harp-au.component
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          sleep 2
          auval -v aumu rfdv HARP
      - name: pluginval (plugin-contract abuse, strictness 10)
        run: |
          curl -sL https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip -o pv.zip
          unzip -q pv.zip
          # Locate the bundle by search — its config subdir (VST3/Release/…)
          # depends on the runner's default generator, which has changed before.
          plug=$(find build-vst -maxdepth 4 -name 'harp-shell.vst3' -type d | head -1)
          test -n "$plug" || { echo "harp-shell.vst3 not found under build-vst"; exit 1; }
          ./pluginval.app/Contents/MacOS/pluginval --strictness-level 10 --skip-gui-tests \
            --validate "$plug"

  shell-windows:
    # Pinned to the VS 2022 image deliberately: this port targets the
    # "Visual Studio 17 2022" generator below. `windows-latest` rolled to
    # windows-2025/VS2026, where that generator finds no VS instance — and
    # because pwsh doesn't abort on a native command's nonzero exit, the
    # failed configure produced nothing yet the step went green. Reproducible
    # toolchain beats latest; the pwsh steps now also fail loudly (see below).
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: clone VST3 SDK
        run: git clone --depth 1 --recursive
             https://github.com/steinbergmedia/vst3sdk.git external/vst3sdk
      - name: clone CLAP SDK (header-only)
        run: git clone --depth 1 --branch 1.2.8
             https://github.com/free-audio/clap.git external/clap
      - name: fetch libusb (prebuilt MSVC binaries — no pkg-config on Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true   # native nonzero exit => step fails
          $ver = '1.0.27'
          Invoke-WebRequest -UseBasicParsing `
            "https://github.com/libusb/libusb/releases/download/v$ver/libusb-$ver.7z" `
            -OutFile libusb.7z
          New-Item -ItemType Directory -Force external/libusb-win | Out-Null
          # Use 7-Zip, not bsdtar: the runner's tar.exe lacks the LZMA codec
          # libusb's .7z uses ("LZMA codec is unsupported"). 7z is on PATH.
          7z x libusb.7z -oexternal/libusb-win -y
      - name: core build + unit tests (MSVC)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true   # native nonzero exit => step fails
          cmake -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config RelWithDebInfo --target harp-tests harp-engine-logic-tests harp-probe
          ctest --test-dir build -C RelWithDebInfo --output-on-failure
      - name: shell + host build, ring tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true   # native nonzero exit => step fails
          # Building harp-shell runs the SDK's moduleinfotool POST_BUILD, which
          # LoadLibrary()'s the plugin and introspects its factory — so a green
          # build IS the DAW-scan load gate (it fails the build if the DLL can't
          # load). Full instantiate + process + audio is covered by the hw runner
          # (real Pi over USB) and local Windows runs; hosted runners have no device.
          cmake -B build-vst -S tools/vst3-host -G "Visual Studio 17 2022" -A x64
          cmake --build build-vst --config Release --target harp-vst3-host harp-shell harp-clap ring-tests mpe-zone-tests
          ctest --test-dir build-vst -C Release --output-on-failure
          # CLAP: a green build + LoadLibrary does NOT prove clap_entry is in the
          # DLL export table (MSVC needs __declspec(dllexport) via CLAP_EXPORT) —
          # GetProcAddress would return NULL and every DAW would silently skip the
          # plugin. There is no Windows clap-host, so verify the export directly.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vc = & $vswhere -latest -property installationPath
          $dumpbin = (Get-ChildItem "$vc\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" | Select-Object -First 1).FullName
          $clap = (Get-ChildItem build-vst -Recurse -Filter harp-clap.clap | Select-Object -First 1).FullName
          if (-not $clap) { throw "harp-clap.clap was not built" }
          $exports = & $dumpbin /EXPORTS $clap
          # NOTE: $exports is a multi-line ARRAY; `-notmatch` on an array returns
          # the non-matching elements (always non-empty), so use Select-String
          # -Quiet for a real boolean "does any line name clap_entry".
          if (-not ($exports | Select-String -Quiet -Pattern 'clap_entry')) {
            throw "clap_entry is NOT exported from harp-clap.clap (CLAP_EXPORT missing?)"
          }
          Write-Host "clap_entry exported from $clap"
      - name: pluginval (plugin-contract abuse, strictness 10)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -UseBasicParsing `
            https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip `
            -OutFile pv.zip
          Expand-Archive pv.zip -DestinationPath pv -Force
          $pv = (Get-ChildItem pv -Recurse -Filter pluginval.exe | Select-Object -First 1).FullName
          # Locate the bundle by search — its config subdir can move with the generator.
          $plug = (Get-ChildItem build-vst -Recurse -Directory -Filter harp-shell.vst3 | Select-Object -First 1).FullName
          if (-not $plug) { throw "harp-shell.vst3 not found under build-vst" }
          # pluginval.exe is a GUI-subsystem (JUCE) app: `& $pv` does not wait for
          # it, so $LASTEXITCODE returns $null and a clean SUCCESS run looks like a
          # failure. Start-Process -Wait -PassThru waits and yields the real exit
          # code; redirect its streams so the test output still appears in the log.
          $p = Start-Process -FilePath $pv -NoNewWindow -Wait -PassThru `
                 -ArgumentList @('--strictness-level','10','--skip-gui-tests','--validate',$plug) `
                 -RedirectStandardOutput pv-out.txt -RedirectStandardError pv-err.txt
          Get-Content pv-out.txt, pv-err.txt
          Write-Host "pluginval exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "pluginval failed (exit $($p.ExitCode))" }

  shell-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: clone VST3 SDK
        run: git clone --depth 1 --recursive
             https://github.com/steinbergmedia/vst3sdk.git external/vst3sdk
      - name: install libusb + libsamplerate + xvfb
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libsamplerate0-dev xvfb
      - name: clone CLAP SDK (header-only)
        run: git clone --depth 1 --branch 1.2.8
             https://github.com/free-audio/clap.git external/clap
      - name: build shell + tools, ring + registry tests
        run: |
          cmake -B build-vst -S tools/vst3-host
          cmake --build build-vst --target harp-vst3-host harp-shell harp-clap clap-host ring-tests registry-tests -j
          ./build-vst/ring-tests
          ./build-vst/registry-tests
      - name: pluginval (plugin-contract abuse, strictness 10)
        run: |
          curl -sL https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip -o pv.zip
          unzip -q pv.zip && chmod +x pluginval
          # Locate the bundle by search — its config subdir depends on the generator.
          plug=$(find build-vst -maxdepth 4 -name 'harp-shell.vst3' -type d | head -1)
          test -n "$plug" || { echo "harp-shell.vst3 not found under build-vst"; exit 1; }
          # xvfb: loading a VST3 module on Linux touches X even with GUI tests off.
          xvfb-run -a ./pluginval --strictness-level 10 --skip-gui-tests --validate "$plug"

  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: build
        run: cmake -B build && cmake --build build -j
      - name: unit tests (core + device_codec params-blob)
        run: ctest --test-dir build --output-on-failure
      - name: ring tests under ThreadSanitizer
        run: |
          clang++ -std=c++17 -fsanitize=thread -O1 -g -I shell \
              tools/vst3-host/ring_tests.cpp -o /tmp/ring-tsan
          /tmp/ring-tsan
      - name: recall flow (simulated device, TCP transport)
        run: |
          ./build/harp-deviced --state-dir /tmp/refdev --panel-sock "" --port 47800 &
          sleep 1
          ./build/harp-probe -d 127.0.0.1:47800 -s /tmp/host demo | tee demo.out
          grep -q "recall complete" demo.out
          ./build/harp-probe -d 127.0.0.1:47800 -s /tmp/host restore | tee restore.out
          grep -q "SYNCED silently" restore.out
          # the §11.3 CAS rejection + override paths (demo/restore only hit the
          # happy path): a wrong expect -> conflict, force overrides it, and an
          # unpushed-closure target -> not-found.
          ./build/harp-probe -d 127.0.0.1:47800 -s /tmp/host cas-test | tee cas.out
          grep -q "CAS-TEST PASS" cas.out

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: build fuzz tree (clang, ASan everywhere, libFuzzer engines)
        run: |
          CC=clang cmake -B build-fuzz -DHARP_FUZZ=ON
          cmake --build build-fuzz -j
      - name: fuzz smoke (coverage-guided, seeded; §16/T9)
        run: |
          mkdir -p corpus && ./build-fuzz/gen-corpus corpus
          for t in cbor envelope object link audio state; do
            echo "=== fuzz-$t"
            ./build-fuzz/fuzz-$t -runs=30000 -max_len=4096 -seed=1 corpus
          done
      - name: protocol abuse vs sanitized daemon (T9-lite)
        run: DEVICED=build-fuzz/harp-deviced PROBE=build-fuzz/harp-probe
             ./scripts/abuse-test.sh
