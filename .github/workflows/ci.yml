name: ci
on: [push, pull_request]

jobs:
  shell-macos:
    runs-on: macos-latest
    timeout-minutes: 45   # cap a hung SDK clone/configure (no per-test alarm covers the build phase)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: clone VST3 SDK
        run: git clone --depth 1 --recursive
             https://github.com/steinbergmedia/vst3sdk.git external/vst3sdk
      - name: install libusb + libsamplerate
        run: brew install libusb libsamplerate
      - name: clone CLAP SDK (header-only)
        run: git clone --depth 1 --branch 1.2.8
             https://github.com/free-audio/clap.git external/clap
      - name: build shell + tools
        run: |
          cmake -B build-vst -S tools/vst3-host
          cmake --build build-vst --target harp-vst3-host harp-shell harp-clap clap-host ring-tests registry-tests runtime-units-tests -j3
      - name: shell unit tests (rings + registry via ctest -L unit)
        run: ctest --test-dir build-vst -L unit --output-on-failure
      - name: root tree — core + engine-logic + device-codec + freerun/rtp tests (gap #3/#4; Apple-clang/arm64)
        # macOS previously configured ONLY the shell tree (build-vst), so the pure
        # integer policies (voice-alloc/arp/mod-routing) and the harpcore codecs never
        # ran on Apple-clang/arm64 — yet the AU shell funnels MPE straight into them.
        # The root configure is cheap (no SDK clone) and picks up the brew libusb/
        # libsamplerate already installed above.
        #
        # freerun/rtp/freerun_mt carry LABELS unit so the §8.3 SINAD-on-the-shipped-
        # converter fixture runs on EVERY OS — but `ctest -L unit` only RUNS a test
        # whose binary exists. brew libsamplerate above makes SAMPLERATE_FOUND true
        # (and macOS is NOT WIN32), so all three targets are defined; build them here
        # or `-L unit` reports them "Not Run". freerun_mt is the TSan SPSC race test.
        run: |
          cmake -B build
          cmake --build build --target harp-engine-logic-tests harp-tests harp-device-tests harp-ffs-link-tests harp-freerun-tests harp-rtp-tests harp-freerun-mt-tests harp-param-map-hash-tests -j3
          ctest --test-dir build -L unit --output-on-failure
      - name: AU shell + auval (Apple's own validation gate)
        run: |
          cmake --build build-vst --target harp-au au-host -j3
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          cp -R "$(find build-vst -name 'harp-au.component' -maxdepth 3 | head -1)" \
                ~/Library/Audio/Plug-Ins/Components/
          codesign --force --deep -s - ~/Library/Audio/Plug-Ins/Components/harp-au.component
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          sleep 2
          auval -v aumu rfdv HARP
      - name: pluginval (plugin-contract abuse, strictness 10)
        run: |
          curl -sL https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_macOS.zip -o pv.zip
          unzip -q pv.zip
          # Locate the bundle by search — its config subdir (VST3/Release/…)
          # depends on the runner's default generator, which has changed before.
          plug=$(find build-vst -maxdepth 4 -name 'harp-shell.vst3' -type d | head -1)
          test -n "$plug" || { echo "harp-shell.vst3 not found under build-vst"; exit 1; }
          ./pluginval.app/Contents/MacOS/pluginval --strictness-level 10 --skip-gui-tests \
            --validate "$plug"
      - name: clap-validator (CLAP contract)
        run: |
          curl -sL https://github.com/free-audio/clap-validator/releases/download/0.3.2/clap-validator-0.3.2-macos-universal.tar.gz -o cv.tar.gz
          tar xzf cv.tar.gz
          cv=$(find . -maxdepth 2 -name clap-validator -type f | head -1); chmod +x "$cv"
          clap=$(find build-vst -name 'harp-clap.clap' | head -1)
          test -n "$clap" || { echo "harp-clap.clap not found under build-vst"; exit 1; }
          "$cv" validate "$clap"

  shell-windows:
    # Pinned to the VS 2022 image deliberately: this port targets the
    # "Visual Studio 17 2022" generator below. `windows-latest` rolled to
    # windows-2025/VS2026, where that generator finds no VS instance — and
    # because pwsh doesn't abort on a native command's nonzero exit, the
    # failed configure produced nothing yet the step went green. Reproducible
    # toolchain beats latest; the pwsh steps now also fail loudly (see below).
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: clone VST3 SDK
        run: git clone --depth 1 --recursive
             https://github.com/steinbergmedia/vst3sdk.git external/vst3sdk
      - name: clone CLAP SDK (header-only)
        run: git clone --depth 1 --branch 1.2.8
             https://github.com/free-audio/clap.git external/clap
      - name: fetch libusb (prebuilt MSVC binaries — no pkg-config on Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true   # native nonzero exit => step fails
          $ver = '1.0.27'
          Invoke-WebRequest -UseBasicParsing `
            "https://github.com/libusb/libusb/releases/download/v$ver/libusb-$ver.7z" `
            -OutFile libusb.7z
          New-Item -ItemType Directory -Force external/libusb-win | Out-Null
          # Use 7-Zip, not bsdtar: the runner's tar.exe lacks the LZMA codec
          # libusb's .7z uses ("LZMA codec is unsupported"). 7z is on PATH.
          7z x libusb.7z -oexternal/libusb-win -y
      - name: core build + unit tests (MSVC)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true   # native nonzero exit => step fails
          cmake -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config RelWithDebInfo --target harp-tests harp-engine-logic-tests harp-probe
          ctest --test-dir build -C RelWithDebInfo --output-on-failure
      - name: shell + host build, ring tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true   # native nonzero exit => step fails
          # Building harp-shell runs the SDK's moduleinfotool POST_BUILD, which
          # LoadLibrary()'s the plugin and introspects its factory — so a green
          # build IS the DAW-scan load gate (it fails the build if the DLL can't
          # load). Full instantiate + process + audio is covered by the hw runner
          # (real Pi over USB) and local Windows runs; hosted runners have no device.
          cmake -B build-vst -S tools/vst3-host -G "Visual Studio 17 2022" -A x64
          cmake --build build-vst --config Release --target harp-vst3-host harp-shell harp-clap ring-tests registry-tests runtime-units-tests
          ctest --test-dir build-vst -C Release -L unit --output-on-failure
          # CLAP: a green build + LoadLibrary does NOT prove clap_entry is in the
          # DLL export table (MSVC needs __declspec(dllexport) via CLAP_EXPORT) —
          # GetProcAddress would return NULL and every DAW would silently skip the
          # plugin. There is no Windows clap-host, so verify the export directly.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vc = & $vswhere -latest -property installationPath
          $dumpbin = (Get-ChildItem "$vc\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" | Select-Object -First 1).FullName
          $clap = (Get-ChildItem build-vst -Recurse -Filter harp-clap.clap | Select-Object -First 1).FullName
          if (-not $clap) { throw "harp-clap.clap was not built" }
          $exports = & $dumpbin /EXPORTS $clap
          # NOTE: $exports is a multi-line ARRAY; `-notmatch` on an array returns
          # the non-matching elements (always non-empty), so use Select-String
          # -Quiet for a real boolean "does any line name clap_entry".
          if (-not ($exports | Select-String -Quiet -Pattern 'clap_entry')) {
            throw "clap_entry is NOT exported from harp-clap.clap (CLAP_EXPORT missing?)"
          }
          Write-Host "clap_entry exported from $clap"
      - name: pluginval (plugin-contract abuse, strictness 10)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -UseBasicParsing `
            https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Windows.zip `
            -OutFile pv.zip
          Expand-Archive pv.zip -DestinationPath pv -Force
          $pv = (Get-ChildItem pv -Recurse -Filter pluginval.exe | Select-Object -First 1).FullName
          # Locate the bundle by search — its config subdir can move with the generator.
          $plug = (Get-ChildItem build-vst -Recurse -Directory -Filter harp-shell.vst3 | Select-Object -First 1).FullName
          if (-not $plug) { throw "harp-shell.vst3 not found under build-vst" }
          # pluginval.exe is a GUI-subsystem (JUCE) app: `& $pv` does not wait for
          # it, so $LASTEXITCODE returns $null and a clean SUCCESS run looks like a
          # failure. Start-Process -Wait -PassThru waits and yields the real exit
          # code; redirect its streams so the test output still appears in the log.
          $p = Start-Process -FilePath $pv -NoNewWindow -Wait -PassThru `
                 -ArgumentList @('--strictness-level','10','--skip-gui-tests','--validate',$plug) `
                 -RedirectStandardOutput pv-out.txt -RedirectStandardError pv-err.txt
          Get-Content pv-out.txt, pv-err.txt
          Write-Host "pluginval exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "pluginval failed (exit $($p.ExitCode))" }
      - name: clap-validator (CLAP contract)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          Invoke-WebRequest -UseBasicParsing `
            https://github.com/free-audio/clap-validator/releases/download/0.3.2/clap-validator-0.3.2-windows.zip `
            -OutFile cv.zip
          Expand-Archive cv.zip -DestinationPath cv -Force
          $cv = (Get-ChildItem cv -Recurse -Filter clap-validator.exe | Select-Object -First 1).FullName
          $clap = (Get-ChildItem build-vst -Recurse -Filter harp-clap.clap | Select-Object -First 1).FullName
          if (-not $clap) { throw "harp-clap.clap not found under build-vst" }
          # clap-validator is a console app, so & waits and $LASTEXITCODE is real.
          & $cv validate $clap
          if ($LASTEXITCODE -ne 0) { throw "clap-validator failed (exit $LASTEXITCODE)" }

  shell-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: clone VST3 SDK
        run: git clone --depth 1 --recursive
             https://github.com/steinbergmedia/vst3sdk.git external/vst3sdk
      - name: install libusb + libsamplerate + xvfb
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libsamplerate0-dev xvfb
      - name: clone CLAP SDK (header-only)
        run: git clone --depth 1 --branch 1.2.8
             https://github.com/free-audio/clap.git external/clap
      - name: build shell + tools, unit tests (rings + registry + mpe-zone via ctest -L unit)
        run: |
          cmake -B build-vst -S tools/vst3-host
          cmake --build build-vst --target harp-vst3-host harp-shell harp-clap clap-host ring-tests registry-tests runtime-units-tests -j
          ctest --test-dir build-vst -L unit --output-on-failure
      - name: pluginval (plugin-contract abuse, strictness 10)
        run: |
          curl -sL https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Linux.zip -o pv.zip
          unzip -q pv.zip && chmod +x pluginval
          # Locate the bundle by search — its config subdir depends on the generator.
          plug=$(find build-vst -maxdepth 4 -name 'harp-shell.vst3' -type d | head -1)
          test -n "$plug" || { echo "harp-shell.vst3 not found under build-vst"; exit 1; }
          # xvfb: loading a VST3 module on Linux touches X even with GUI tests off.
          xvfb-run -a ./pluginval --strictness-level 10 --skip-gui-tests --validate "$plug"
      - name: clap-validator (CLAP contract)
        run: |
          curl -sL https://github.com/free-audio/clap-validator/releases/download/0.3.2/clap-validator-0.3.2-ubuntu-18.04.tar.gz -o cv.tar.gz
          tar xzf cv.tar.gz
          cv=$(find . -maxdepth 2 -name clap-validator -type f | head -1); chmod +x "$cv"
          clap=$(find build-vst -name 'harp-clap.clap' | head -1)
          test -n "$clap" || { echo "harp-clap.clap not found under build-vst"; exit 1; }
          # xvfb: loading a CLAP module on Linux touches X, same as the VST3 above.
          xvfb-run -a "$cv" validate "$clap"

  core:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: install libsamplerate (enables the freerun/rtp ASRC unit tests)
        run: sudo apt-get update && sudo apt-get install -y libsamplerate0-dev
      - name: build
        run: cmake -B build && cmake --build build -j
      - name: unit tests (core + device_codec + freerun/rtp ASRC stopband/reanchor)
        run: ctest --test-dir build --output-on-failure
      - name: ring tests under ThreadSanitizer
        run: |
          clang++ -std=c++17 -fsanitize=thread -O1 -g -I shell \
              tools/vst3-host/ring_tests.cpp -o /tmp/ring-tsan
          /tmp/ring-tsan
      - name: recall flow (simulated device, TCP transport)
        run: |
          ./build/harp-deviced --state-dir /tmp/refdev --panel-sock "" --port 47800 &
          sleep 1
          ./build/harp-probe -d 127.0.0.1:47800 -s /tmp/host demo | tee demo.out
          grep -q "recall complete" demo.out
          ./build/harp-probe -d 127.0.0.1:47800 -s /tmp/host restore | tee restore.out
          grep -q "SYNCED silently" restore.out
          # the §11.3 CAS rejection + override paths (demo/restore only hit the
          # happy path): a wrong expect -> conflict, force overrides it, and an
          # unpushed-closure target -> not-found.
          ./build/harp-probe -d 127.0.0.1:47800 -s /tmp/host cas-test | tee cas.out
          grep -q "CAS-TEST PASS" cas.out
          # §5.4 graceful version negotiation: a current-major hello succeeds, and a
          # forced major mismatch yields 'incompatible' WITH the device's supported
          # range (so a host can prompt for a firmware/host update, not fail opaquely).
          ./build/harp-probe -d 127.0.0.1:47800 -s /tmp/host version-test | tee vt-ctl.out
          grep -q "VERSION-TEST PASS (control)" vt-ctl.out
          HARP_FORCE_PROTO_MAJOR=2 ./build/harp-probe -d 127.0.0.1:47800 -s /tmp/host version-test | tee vt-mis.out
          grep -q "VERSION-TEST PASS:" vt-mis.out
          # §7.1/§8.6 time.epoch on a sample-rate change + stale-epoch event discard (evt_stale_epoch)
          ./build/harp-probe -d 127.0.0.1:47800 -s /tmp/host epoch-test | tee epoch.out
          grep -q "EPOCH-TEST PASS" epoch.out
          # §5.2 the device ignores unknown notifications + keeps serving
          ./build/harp-probe -d 127.0.0.1:47800 -s /tmp/host notif-test | tee notif.out
          grep -q "NOTIF-TEST PASS" notif.out
          # §9.8 evt.format/evt.parse round-trip (continuous + stepped params)
          ./build/harp-probe -d 127.0.0.1:47800 -s /tmp/host format-test | tee format.out
          grep -q "FORMAT-TEST PASS" format.out
      - name: reconcile relay (§11.4 four actions over the protocol, sim device + panel)
        run: ./scripts/reconcile-relay-test.sh
      - name: web panel sidecar smoke (§11 — harp-panel.py JSON endpoints over the sim daemon)
        run: ./scripts/web-panel-test.sh

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: build fuzz tree (clang, ASan everywhere, libFuzzer engines)
        run: |
          CC=clang cmake -B build-fuzz -DHARP_FUZZ=ON
          cmake --build build-fuzz -j
      - name: fuzz smoke (coverage-guided, seeded; §16/T9)
        run: |
          mkdir -p corpus && ./build-fuzz/gen-corpus corpus
          for t in cbor envelope object link audio state evt; do
            echo "=== fuzz-$t"
            ./build-fuzz/fuzz-$t -runs=30000 -max_len=4096 -seed=1 corpus
          done
      - name: protocol abuse vs sanitized daemon (T9-lite)
        run: DEVICED=build-fuzz/harp-deviced PROBE=build-fuzz/harp-probe
             ./scripts/abuse-test.sh

  static-analysis:
    # cppcheck (warning + portability) over the production C/C++ sources against a documented
    # by-design baseline (scripts/cppcheck-suppressions.txt). Catches a NEW real issue (uninit
    # use, null deref, buffer overflow, ...) on every push without a build — the cloud-side
    # complement to the ASan/UBSan nightly. No SDK/build needed; cppcheck parses with the include
    # dirs. Fast (~1 min). Fails only on a finding OUTSIDE the baseline.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: cppcheck (warning + portability, baselined)
        run: bash scripts/run-cppcheck.sh

  coverage:
    # Quantified test-coverage metric (gcovr) over the unit-tested C core — the chair's named
    # "no quantified metric" gap. Instruments the build, runs the ctest suite (a clean exit flushes
    # the .gcda), and prints line/branch coverage. The floor catches a coverage REGRESSION; device
    # DSP/session paths reached only by the script suite (whose daemon is SIGKILLed, so it would not
    # flush .gcda) are deliberately out of this unit-level metric.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: install gcovr + libsamplerate
        run: sudo apt-get update && sudo apt-get install -y gcovr libsamplerate0-dev
      - name: build (coverage-instrumented)
        run: |
          cmake -B build-cov -DCMAKE_C_FLAGS="--coverage -O0 -g" -DCMAKE_CXX_FLAGS="--coverage -O0 -g"
          cmake --build build-cov -j
      - name: run the unit-test suite (clean exit flushes .gcda)
        # Exclude freerun_mt: it is a CONCURRENCY/timing stress test (race detection — covered in the
        # core job + TSan), and gcov's non-atomic counter writes + the -O0 instrumentation slowdown
        # perturb its thread timing under coverage. It adds no unique lines here — freerun.c is covered
        # by the single-threaded `freerun` test — so dropping it from the COVERAGE run masks nothing.
        run: ctest --test-dir build-cov --output-on-failure -E freerun_mt
      - name: coverage metric (gcovr) — gate the unit-tested protocol core; report overall
        # The quantified metric the panel asked for. The GATE is core/src/ — the protocol library the
        # unit suite is responsible for (~85% lines: cbor/store/object/frame/audio/envelope/link). The
        # device daemon, engine, and socket I/O are exercised by the eth-suite + the engine-render
        # golden (#119) + HW, not the gcov-instrumented unit build (its SIGKILLed daemon never flushes
        # .gcda), so they read ~0% here and would only make the gate a meaningless aggregate — they are
        # reported separately, informationally. The plat shim has no unit test by design.
        run: |
          echo "── GATE: core protocol unit coverage (core/src/, the unit-test target):"
          gcovr --root . --filter 'core/src/' --exclude '.*plat_.*' \
            --print-summary --fail-under-line 78
          echo "── INFORMATIONAL: overall core/host/device (device + socket I/O are eth-suite/HW-tested, not unit-tested):"
          gcovr --root . --filter 'core/src/' --filter 'host/' --filter 'device/' \
            --exclude '.*test.*' --exclude '.*external.*' --exclude '.*vst3sdk.*' --print-summary
