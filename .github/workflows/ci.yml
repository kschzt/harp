name: ci
on: [push, pull_request]

jobs:
  shell-macos:
    runs-on: macos-latest
    timeout-minutes: 45   # cap a hung SDK clone/configure (no per-test alarm covers the build phase)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: clone VST3 SDK
        run: git clone --depth 1 --recursive
             https://github.com/steinbergmedia/vst3sdk.git external/vst3sdk
      - name: install libusb + libsamplerate
        run: brew install libusb libsamplerate
      - name: clone CLAP SDK (header-only)
        run: git clone --depth 1 --branch 1.2.8
             https://github.com/free-audio/clap.git external/clap
      - name: build shell + tools
        run: |
          cmake -B build-vst -S tools/vst3-host
          cmake --build build-vst --target harp-vst3-host harp-shell harp-fx-shell harp-clap clap-host ring-tests registry-tests runtime-units-tests -j3
      - name: shell unit tests (rings + registry via ctest -L unit)
        run: ctest --test-dir build-vst -L unit --output-on-failure
      - name: root tree — core + engine-logic + device-codec + freerun/rtp tests (gap #3/#4; Apple-clang/arm64)
        # macOS previously configured ONLY the shell tree (build-vst), so the pure
        # integer policies (voice-alloc/arp/mod-routing) and the harpcore codecs never
        # ran on Apple-clang/arm64 — yet the AU shell funnels MPE straight into them.
        # The root configure is cheap (no SDK clone) and picks up the brew libusb/
        # libsamplerate already installed above.
        #
        # freerun/rtp/rtp-hf/freerun_mt carry LABELS unit so the §8.3 SINAD-on-the-shipped-
        # converter fixture (and the HF rms-band converter gate) run on EVERY OS — but
        # `ctest -L unit` only RUNS a test whose binary exists. brew libsamplerate above
        # makes SAMPLERATE_FOUND true (and macOS is NOT WIN32), so all targets are defined;
        # build them here or `-L unit` reports them "Not Run". freerun_mt is the TSan SPSC
        # race test; rtp-hf is the §8.3 high-frequency converter-quality gate.
        run: |
          cmake -B build -DHARP_WERROR=ON
          cmake --build build --target harp-engine-logic-tests harp-tests harp-logring-tests harp-device-tests harp-ffs-link-tests harp-freerun-tests harp-rtp-tests harp-rtp-hf-tests harp-freerun-mt-tests harp-param-map-hash-tests -j3
          ctest --test-dir build -L unit --output-on-failure
      - name: AU shell + auval (Apple's own validation gate)
        run: |
          cmake --build build-vst --target harp-au au-host -j3
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          cp -R "$(find build-vst -name 'harp-au.component' -maxdepth 3 | head -1)" \
                ~/Library/Audio/Plug-Ins/Components/
          codesign --force --deep -s - ~/Library/Audio/Plug-Ins/Components/harp-au.component
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          sleep 2
          auval -v aumu rfdv HARP
      - name: pluginval (plugin-contract abuse, strictness 10)
        run: |
          curl -sL https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_macOS.zip -o pv.zip
          unzip -q pv.zip
          # Locate the bundle by search — its config subdir (VST3/Release/…)
          # depends on the runner's default generator, which has changed before.
          plug=$(find build-vst -maxdepth 4 -name 'harp-shell.vst3' -type d | head -1)
          test -n "$plug" || { echo "harp-shell.vst3 not found under build-vst"; exit 1; }
          ./pluginval.app/Contents/MacOS/pluginval --strictness-level 10 --skip-gui-tests \
            --validate "$plug"
      - name: clap-validator (CLAP contract)
        run: |
          curl -sL https://github.com/free-audio/clap-validator/releases/download/0.3.2/clap-validator-0.3.2-macos-universal.tar.gz -o cv.tar.gz
          tar xzf cv.tar.gz
          cv=$(find . -maxdepth 2 -name clap-validator -type f | head -1); chmod +x "$cv"
          clap=$(find build-vst -name 'harp-clap.clap' | head -1)
          test -n "$clap" || { echo "harp-clap.clap not found under build-vst"; exit 1; }
          "$cv" validate "$clap"

  shell-windows:
    # Pinned to the VS 2022 image deliberately: this port targets the
    # "Visual Studio 17 2022" generator below. `windows-latest` rolled to
    # windows-2025/VS2026, where that generator finds no VS instance — and
    # because pwsh doesn't abort on a native command's nonzero exit, the
    # failed configure produced nothing yet the step went green. Reproducible
    # toolchain beats latest; the pwsh steps now also fail loudly (see below).
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: clone VST3 SDK
        run: git clone --depth 1 --recursive
             https://github.com/steinbergmedia/vst3sdk.git external/vst3sdk
      - name: clone CLAP SDK (header-only)
        run: git clone --depth 1 --branch 1.2.8
             https://github.com/free-audio/clap.git external/clap
      - name: fetch libusb (prebuilt MSVC binaries — no pkg-config on Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true   # native nonzero exit => step fails
          $ver = '1.0.27'
          Invoke-WebRequest -UseBasicParsing `
            "https://github.com/libusb/libusb/releases/download/v$ver/libusb-$ver.7z" `
            -OutFile libusb.7z
          New-Item -ItemType Directory -Force external/libusb-win | Out-Null
          # Use 7-Zip, not bsdtar: the runner's tar.exe lacks the LZMA codec
          # libusb's .7z uses ("LZMA codec is unsupported"). 7z is on PATH.
          7z x libusb.7z -oexternal/libusb-win -y
      - name: core build + unit tests (MSVC)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true   # native nonzero exit => step fails
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DHARP_WERROR=ON
          cmake --build build --config RelWithDebInfo --target harp-tests harp-engine-logic-tests harp-probe
          ctest --test-dir build -C RelWithDebInfo --output-on-failure
      - name: shell + host build, ring tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true   # native nonzero exit => step fails
          # Building harp-shell runs the SDK's moduleinfotool POST_BUILD, which
          # LoadLibrary()'s the plugin and introspects its factory — so a green
          # build IS the DAW-scan load gate (it fails the build if the DLL can't
          # load). Full instantiate + process + audio is covered by the hw runner
          # (real Pi over USB) and local Windows runs; hosted runners have no device.
          cmake -B build-vst -S tools/vst3-host -G "Visual Studio 17 2022" -A x64
          cmake --build build-vst --config Release --target harp-vst3-host harp-shell harp-fx-shell harp-clap ring-tests registry-tests runtime-units-tests
          ctest --test-dir build-vst -C Release -L unit --output-on-failure
          # CLAP: a green build + LoadLibrary does NOT prove clap_entry is in the
          # DLL export table (MSVC needs __declspec(dllexport) via CLAP_EXPORT) —
          # GetProcAddress would return NULL and every DAW would silently skip the
          # plugin. There is no Windows clap-host, so verify the export directly.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vc = & $vswhere -latest -property installationPath
          $dumpbin = (Get-ChildItem "$vc\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" | Select-Object -First 1).FullName
          $clap = (Get-ChildItem build-vst -Recurse -Filter harp-clap.clap | Select-Object -First 1).FullName
          if (-not $clap) { throw "harp-clap.clap was not built" }
          $exports = & $dumpbin /EXPORTS $clap
          # NOTE: $exports is a multi-line ARRAY; `-notmatch` on an array returns
          # the non-matching elements (always non-empty), so use Select-String
          # -Quiet for a real boolean "does any line name clap_entry".
          if (-not ($exports | Select-String -Quiet -Pattern 'clap_entry')) {
            throw "clap_entry is NOT exported from harp-clap.clap (CLAP_EXPORT missing?)"
          }
          Write-Host "clap_entry exported from $clap"
      - name: pluginval (plugin-contract abuse, strictness 10)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -UseBasicParsing `
            https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Windows.zip `
            -OutFile pv.zip
          Expand-Archive pv.zip -DestinationPath pv -Force
          $pv = (Get-ChildItem pv -Recurse -Filter pluginval.exe | Select-Object -First 1).FullName
          # Locate the bundle by search — its config subdir can move with the generator.
          $plug = (Get-ChildItem build-vst -Recurse -Directory -Filter harp-shell.vst3 | Select-Object -First 1).FullName
          if (-not $plug) { throw "harp-shell.vst3 not found under build-vst" }
          # pluginval.exe is a GUI-subsystem (JUCE) app: `& $pv` does not wait for
          # it, so $LASTEXITCODE returns $null and a clean SUCCESS run looks like a
          # failure. Start-Process -Wait -PassThru waits and yields the real exit
          # code; redirect its streams so the test output still appears in the log.
          $p = Start-Process -FilePath $pv -NoNewWindow -Wait -PassThru `
                 -ArgumentList @('--strictness-level','10','--skip-gui-tests','--validate',$plug) `
                 -RedirectStandardOutput pv-out.txt -RedirectStandardError pv-err.txt
          Get-Content pv-out.txt, pv-err.txt
          Write-Host "pluginval exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "pluginval failed (exit $($p.ExitCode))" }
      - name: clap-validator (CLAP contract)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          Invoke-WebRequest -UseBasicParsing `
            https://github.com/free-audio/clap-validator/releases/download/0.3.2/clap-validator-0.3.2-windows.zip `
            -OutFile cv.zip
          Expand-Archive cv.zip -DestinationPath cv -Force
          $cv = (Get-ChildItem cv -Recurse -Filter clap-validator.exe | Select-Object -First 1).FullName
          $clap = (Get-ChildItem build-vst -Recurse -Filter harp-clap.clap | Select-Object -First 1).FullName
          if (-not $clap) { throw "harp-clap.clap not found under build-vst" }
          # clap-validator is a console app, so & waits and $LASTEXITCODE is real.
          & $cv validate $clap
          if ($LASTEXITCODE -ne 0) { throw "clap-validator failed (exit $LASTEXITCODE)" }

  shell-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: clone VST3 SDK
        run: git clone --depth 1 --recursive
             https://github.com/steinbergmedia/vst3sdk.git external/vst3sdk
      - name: install libusb + libsamplerate + xvfb
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libsamplerate0-dev xvfb
      - name: clone CLAP SDK (header-only)
        run: git clone --depth 1 --branch 1.2.8
             https://github.com/free-audio/clap.git external/clap
      - name: build shell + tools, unit tests (rings + registry + mpe-zone via ctest -L unit)
        run: |
          cmake -B build-vst -S tools/vst3-host
          cmake --build build-vst --target harp-vst3-host harp-shell harp-fx-shell harp-clap clap-host ring-tests registry-tests runtime-units-tests -j
          ctest --test-dir build-vst -L unit --output-on-failure
      - name: pluginval (plugin-contract abuse, strictness 10)
        run: |
          curl -sL https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Linux.zip -o pv.zip
          unzip -q pv.zip && chmod +x pluginval
          # Locate the bundle by search — its config subdir depends on the generator.
          plug=$(find build-vst -maxdepth 4 -name 'harp-shell.vst3' -type d | head -1)
          test -n "$plug" || { echo "harp-shell.vst3 not found under build-vst"; exit 1; }
          # xvfb: loading a VST3 module on Linux touches X even with GUI tests off.
          xvfb-run -a ./pluginval --strictness-level 10 --skip-gui-tests --validate "$plug"
      - name: clap-validator (CLAP contract)
        run: |
          curl -sL https://github.com/free-audio/clap-validator/releases/download/0.3.2/clap-validator-0.3.2-ubuntu-18.04.tar.gz -o cv.tar.gz
          tar xzf cv.tar.gz
          cv=$(find . -maxdepth 2 -name clap-validator -type f | head -1); chmod +x "$cv"
          clap=$(find build-vst -name 'harp-clap.clap' | head -1)
          test -n "$clap" || { echo "harp-clap.clap not found under build-vst"; exit 1; }
          # xvfb: loading a CLAP module on Linux touches X, same as the VST3 above.
          xvfb-run -a "$cv" validate "$clap"

  core:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: install libsamplerate (enables the freerun/rtp ASRC unit tests)
        run: sudo apt-get update && sudo apt-get install -y libsamplerate0-dev
      - name: build
        run: cmake -B build -DHARP_WERROR=ON && cmake --build build -j
      - name: unit tests (core + device_codec + freerun/rtp ASRC stopband/reanchor)
        run: ctest --test-dir build --output-on-failure
      - name: engine-render golden (debt #19 — raw device DSP render_output(): determinism + non-silence + pinned hash)
        run: ./scripts/engine-golden-test.sh
      - name: ring tests under ThreadSanitizer
        run: |
          clang++ -std=c++17 -fsanitize=thread -O1 -g -I shell \
              tools/vst3-host/ring_tests.cpp -o /tmp/ring-tsan
          /tmp/ring-tsan
      - name: recall flow (simulated device, TCP transport)
        run: |
          ./build/harp-deviced --state-dir /tmp/refdev --panel-sock "" --port 17800 &
          sleep 1
          ./build/harp-probe -d 127.0.0.1:17800 -s /tmp/host demo | tee demo.out
          grep -q "recall complete" demo.out
          ./build/harp-probe -d 127.0.0.1:17800 -s /tmp/host restore | tee restore.out
          grep -q "SYNCED silently" restore.out
          # the §11.3 CAS rejection + override paths (demo/restore only hit the
          # happy path): a wrong expect -> conflict, force overrides it, and an
          # unpushed-closure target -> not-found.
          ./build/harp-probe -d 127.0.0.1:17800 -s /tmp/host cas-test | tee cas.out
          grep -q "CAS-TEST PASS" cas.out
          # §5.4 graceful version negotiation: a current-major hello succeeds, and a
          # forced major mismatch yields 'incompatible' WITH the device's supported
          # range (so a host can prompt for a firmware/host update, not fail opaquely).
          ./build/harp-probe -d 127.0.0.1:17800 -s /tmp/host version-test | tee vt-ctl.out
          grep -q "VERSION-TEST PASS (control)" vt-ctl.out
          HARP_FORCE_PROTO_MAJOR=2 ./build/harp-probe -d 127.0.0.1:17800 -s /tmp/host version-test | tee vt-mis.out
          grep -q "VERSION-TEST PASS:" vt-mis.out
          # §7.1/§8.6 time.epoch on a sample-rate change + stale-epoch event discard (evt_stale_epoch)
          ./build/harp-probe -d 127.0.0.1:17800 -s /tmp/host epoch-test | tee epoch.out
          grep -q "EPOCH-TEST PASS" epoch.out
          # §5.2 the device ignores unknown notifications + keeps serving
          ./build/harp-probe -d 127.0.0.1:17800 -s /tmp/host notif-test | tee notif.out
          grep -q "NOTIF-TEST PASS" notif.out
          # §9.8 evt.format/evt.parse round-trip (continuous + stepped params)
          ./build/harp-probe -d 127.0.0.1:17800 -s /tmp/host format-test | tee format.out
          grep -q "FORMAT-TEST PASS" format.out
      - name: reconcile relay (§11.4 four actions over the protocol, sim device + panel)
        run: ./scripts/reconcile-relay-test.sh
      - name: web panel sidecar smoke (§11 — harp-panel.py JSON endpoints over the sim daemon)
        run: ./scripts/web-panel-test.sh

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: build fuzz tree (clang, ASan everywhere, libFuzzer engines)
        run: |
          CC=clang cmake -B build-fuzz -DHARP_FUZZ=ON
          cmake --build build-fuzz -j
      - name: fuzz smoke (coverage-guided, seeded; §16/T9)
        run: |
          mkdir -p corpus && ./build-fuzz/gen-corpus corpus
          for t in cbor envelope object link audio state evt ffs; do
            echo "=== fuzz-$t"
            ./build-fuzz/fuzz-$t -runs=30000 -max_len=4096 -seed=1 corpus
          done
      - name: protocol abuse vs sanitized daemon (T9-lite)
        run: DEVICED=build-fuzz/harp-deviced PROBE=build-fuzz/harp-probe
             ./scripts/abuse-test.sh

  static-analysis:
    # cppcheck (warning + portability) over the production C/C++ sources against a documented
    # by-design baseline (scripts/cppcheck-suppressions.txt). Catches a NEW real issue (uninit
    # use, null deref, buffer overflow, ...) on every push without a build — the cloud-side
    # complement to the ASan/UBSan nightly. No SDK/build needed; cppcheck parses with the include
    # dirs. Fast (~1 min). Fails only on a finding OUTSIDE the baseline.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: install cppcheck + clang-tidy
        run: sudo apt-get update && sudo apt-get install -y cppcheck clang-tidy
      - name: cppcheck (warning + portability, baselined)
        run: bash scripts/run-cppcheck.sh
      - name: clang-tidy (curated static analysis — .clang-tidy)
        # clang-analyzer path-sensitive analysis (null derefs, leaks, uninit, logic) + a
        # curated bugprone/cert set over HARP's wire-facing + RT C sources. Config + the
        # per-check disable rationale live in .clang-tidy; WarningsAsErrors makes a finding
        # fail the gate. Needs the compile DB (no SDK — the default build tree).
        run: |
          cmake -B build-tidy -DCMAKE_EXPORT_COMPILE_COMMANDS=ON >/dev/null
          run-clang-tidy -p build-tidy -quiet $(git ls-files 'core/src/*.c' 'device/*.c' 'host/*.c')
      - name: CDDL wire-validation (schema-as-contract)
        # The normative schema (spec/harp.cddl) is MACHINE-READABLE but was never machine-CHECKED:
        # a rule could drift from Appendix A / the code and no test would notice. scripts/cddl-validate.py
        # proves harp.cddl is well-formed AND validates representative on-the-wire CBOR artifacts
        # (envelope, param/txn events, objects, ref, identity, recall-bundle) against their rules with a
        # real CDDL validator (pycddl). It already caught a real bug: `uint64` was referenced but never
        # defined (not a CDDL prelude type) — now `uint64 = uint`. Complements the behavioural wire tests.
        run: |
          pip3 install --quiet pycddl cbor2
          python3 scripts/cddl-validate.py
      - name: soak silence-oracle self-test (harp-soak.sh HARD-fails a silent render)
        # hardware-free proof that the soak's #90 silence gate FIRES on a silent render
        # (rms<floor) and PASSES real audio — so a refactor can't silently neuter it.
        run: HARP_SOAK_SELFTEST=1 bash scripts/harp-soak.sh

  coverage:
    # Quantified test-coverage metric (gcovr) over the two surfaces CI is responsible for — the
    # panel's named "no quantified metric" gap. Instruments the build, then flushes .gcda from a
    # CLEAN exit on BOTH levels: (1) the ctest UNIT suite covers core/src/ (protocol library);
    # (2) a dedicated clean-exit harp-deviced drive (device-coverage-drive.sh) covers the device
    # DAEMON (session/state/audio_loop/engine + harp-deviced + panel) — the eth-suite SIGKILLs its
    # daemon so it never flushes, which is why these read ~0% before. Both carry a real line/branch
    # number and a regression floor; the USB/FFS transport (ffs.c, no cloud path) stays HW-gated.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: install gcovr + lcov + libsamplerate
        run: sudo apt-get update && sudo apt-get install -y gcovr lcov libsamplerate0-dev
      - name: build (coverage-instrumented via -DHARP_COVERAGE=ON)
        # The instrumentation now lives behind a first-class CMake switch (CMakeLists.txt:
        # option(HARP_COVERAGE)) instead of raw CMAKE_C_FLAGS — same --coverage -O0 -g flags,
        # one documented knob a local run can flip too.
        run: |
          cmake -B build-cov -DHARP_COVERAGE=ON
          cmake --build build-cov -j
      - name: run the unit-test suite (clean exit flushes .gcda)
        # Exclude freerun_mt: it is a CONCURRENCY/timing stress test (race detection — covered in the
        # core job + TSan), and gcov's non-atomic counter writes + the -O0 instrumentation slowdown
        # perturb its thread timing under coverage. It adds no unique lines here — freerun.c is covered
        # by the single-threaded `freerun` test — so dropping it from the COVERAGE run masks nothing.
        run: ctest --test-dir build-cov --output-on-failure -E freerun_mt
      - name: device-daemon clean-exit coverage drive (flushes device/.gcda the SIGKILLed suite can't)
        # The eth conformance suite SIGKILLs its daemon, so gcov never flushes the device .gcda and
        # device/{session,state,audio_loop,engine}.c + harp-deviced.c + panel.c read ~0% in this
        # instrumented unit build — which is why the gate below could only ever cover core/src/. This
        # drives a CLEAN-EXIT harp-deviced (HARP_CLEAN_EXIT=1 makes SIGTERM RETURN from main() so the
        # atexit __gcov dump runs) through a representative slice — hello/identity, recall save/restore/
        # CAS/txn, §9 events, host-paced + free-running RTP audio, the bounded event fence, the front
        # panel, and the raw engine render — so device/ carries a REAL line/branch number, not a
        # behavioural-only pass/fail. The probe protocol asserts are deterministic (a failure is a real
        # regression); the audio fidelity is gated in eth.yml, not re-asserted here. ALL binaries were
        # built by the coverage build above; the .gcda ACCUMULATES on top of the unit run.
        run: ./scripts/device-coverage-drive.sh
      - name: coverage metric (gcovr) — gate the unit-tested core, the driven device daemon AND the host wire transport
        # The quantified test-coverage metric (gcovr), now over the three responsible surfaces:
        #  • core/src/  — the protocol library the UNIT suite covers (~85% lines:
        #                 cbor/store/object/frame/audio/envelope/link). Gate: --fail-under-line 78.
        #  • device/    — the device daemon (session/state/audio_loop/engine + harp-deviced + panel),
        #                 now driven to a clean exit by the step above so its .gcda actually flushes
        #                 (~71% lines on the dev box). Gate: --fail-under-line 64 (a regression floor
        #                 with headroom for gcc-vs-clang + Linux/platform-#ifdef variance, same ~7-pt
        #                 margin as the core gate's 78-vs-85; PRINTED below so a green run can tighten
        #                 it — capture-then-pin, like the engine-golden hashes).
        #  • host/      — the wire-facing socket + RTP transport (sock_io.c/rtp.c/rtp_udp.c/client.c),
        #                 driven by the unit suite (rtp/rtp-hf/freerun) + the harp-probe/eth-rtp drive
        #                 above (~81% lines). Gate: --fail-under-line 72 (GATE 3/3 below). Until now
        #                 host/ was INFORMATIONAL-only (no --fail-under) so a socket/RTP tested-ness
        #                 regression was silent; harp-probe.c (the CLI) + the USB/mDNS host paths stay
        #                 out of the filter (HW-gated / CLI, not the wire layer).
        # SCOPE (honest): the gate gates LINE coverage (branch counting differs across gcc/clang, so it
        # is REPORTED, not gated — same as the core gate). device/ffs.c (the USB/FunctionFS gadget
        # transport) is EXCLUDED from the device gate: it needs real USB hardware, has no cloud path,
        # and is covered on the hw rig (hw.yml) — including it would read ~0% and make the gate a
        # meaningless aggregate. ffs_link.c (framed-link codec) stays in: it is unit-tested cross-OS.
        # The plat shim (core) has no unit test by design.
        run: |
          echo "── GATE 1/3: core protocol unit coverage (core/src/, the unit-test target):"
          gcovr --root . --filter 'core/src/' --exclude '.*plat_.*' \
            --print-summary --fail-under-line 78
          echo ""
          echo "════════════════════════════════════════════════════════════════════════════"
          echo "── GATE 2/3: DEVICE DAEMON coverage (device/, clean-exit-driven; ffs.c = HW-gated):"
          echo "════════════════════════════════════════════════════════════════════════════"
          gcovr --root . --filter 'device/' \
            --exclude '.*test.*' --exclude '.*ffs\.c$' \
            --print-summary --fail-under-line 64
          echo ""
          echo "════════════════════════════════════════════════════════════════════════════"
          echo "── GATE 3/3: HOST WIRE TRANSPORT coverage (host/ socket + RTP; unit + drive):"
          echo "════════════════════════════════════════════════════════════════════════════"
          # The wire-facing host transport: the §16 eth control socket (sock_io.c), the §8.7 RTP
          # packetiser (rtp.c), the RTP/UDP datagram plane (rtp_udp.c) and the transport-agnostic
          # client dial/session library (client.c). Driven to a REAL line number by the runs above —
          # the ctest unit suite (rtp/rtp-hf/freerun) covers rtp.c, and device-coverage-drive.sh dials
          # harp-probe + the eth-rtp/bitexact tools over TCP/RTP, exercising sock_io.c/client.c/rtp_udp.c.
          # host/ was previously INFORMATIONAL-only (no --fail-under), so a socket/RTP tested-ness
          # regression here was SILENT. Measured 80.6% lines (694/861) on the coverage build; floor 72
          # leaves ~8pt for gcc-vs-clang line attribution + drive-timing variance (same capture-then-pin
          # margin as the 78/85 core and 64/71 device gates). harp-probe.c (the interactive CLI, ~63%)
          # and the USB/mDNS/rt_sched host paths (HW-gated, ~0% in the cloud) are DELIBERATELY excluded
          # from the filter — this gates the substantive TCP/RTP wire layer, not a padded aggregate.
          gcovr --root . \
            --filter 'host/sock_io\.c' --filter 'host/rtp\.c' \
            --filter 'host/rtp_udp\.c' --filter 'host/client\.c' \
            --print-summary --fail-under-line 72
          echo ""
          echo "── INFORMATIONAL: per-file host/ wire-transport breakdown (harp-probe.c CLI = report-only):"
          gcovr --root . --filter 'host/' --exclude '.*test.*' --txt 2>/dev/null | \
            grep -E '^host/.*\.(c|h)' || true
          echo ""
          echo "── INFORMATIONAL: per-file device/ breakdown (panel.c = sidecar-driven; ffs.c = USB/HW):"
          gcovr --root . --filter 'device/' --exclude '.*test.*' --txt 2>/dev/null | \
            grep -E '^device/.*\.(c|h)' || true
          echo "── INFORMATIONAL: overall core/host/device (host wire layer gated in GATE 3/3 above):"
          gcovr --root . --filter 'core/src/' --filter 'host/' --filter 'device/' \
            --exclude '.*test.*' --exclude '.*external.*' --exclude '.*vst3sdk.*' --print-summary
      - name: line-coverage TOTAL % (lcov summary) + uploaded report artifact
        # The panel's "no quantified metric" gap, as a SINGLE visible line-coverage number plus a
        # browsable report. This step is REPORT-ONLY (exit 0): the regression FLOOR is the gcovr
        # gate above; here we just surface the total. lcov captures the .gcda the build produced,
        # drops tests/fuzz/external/system, prints the total line %, and genhtml renders the HTML
        # artifact. lcov/gcov version quirks are made non-fatal (generous --ignore-errors + a gcovr
        # fallback for the %) so the metric ALWAYS prints and the artifact always uploads.
        run: |
          set +e
          IGN="--ignore-errors mismatch,unused,gcov,source,empty"
          lcov --capture --directory build-cov --base-directory "$PWD" \
               --output-file coverage.info --rc geninfo_unexecuted_blocks=1 $IGN
          lcov --remove coverage.info \
               '*/tests/*' '*/fuzz/*' '*/external/*' '*/vst3sdk/*' '/usr/*' \
               --output-file coverage-filtered.info $IGN
          genhtml coverage-filtered.info --output-directory coverage-html \
                  --title "HARP cloud line coverage" $IGN
          echo ""
          echo "════════════════════════════════════════════════════════════════════════════"
          echo " HARP CLOUD LINE-COVERAGE METRIC (core/ + host/ + device/, ffs.c HW-gated)"
          echo "════════════════════════════════════════════════════════════════════════════"
          pct=""
          if [ -s coverage-filtered.info ]; then
            lcov --summary coverage-filtered.info $IGN 2>&1 | tee lcov-summary.txt
            pct=$(sed -nE 's/.*lines[^0-9]*([0-9]+(\.[0-9]+)?)%.*/\1/p' lcov-summary.txt | head -1)
          fi
          if [ -z "$pct" ]; then
            echo "lcov summary unavailable — gcovr fallback for the TOTAL % (artifact still uploaded):"
            gcovr --root . --filter 'core/src/' --filter 'host/' --filter 'device/' \
              --exclude '.*test.*' --exclude '.*external.*' --exclude '.*vst3sdk.*' \
              --exclude '.*ffs\.c$' --gcov-ignore-parse-errors 2>/dev/null | tee gcovr-total.txt
            pct=$(sed -nE 's/^TOTAL.* ([0-9]+)%.*/\1/p' gcovr-total.txt | head -1)
          fi
          echo ""
          echo "TOTAL_LINE_COVERAGE=${pct:-unknown}%"
          echo "### HARP cloud line coverage: ${pct:-unknown}%" >> "${GITHUB_STEP_SUMMARY:-/dev/null}" 2>/dev/null || true
          exit 0
      - name: upload the lcov coverage report (info + summary + HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            coverage-filtered.info
            lcov-summary.txt
            coverage-html
          if-no-files-found: warn

  lsan:
    # LeakSanitizer gate on the long-running device DAEMON — closes a real gap in the sanitizer
    # coverage: eth-asan.yml sets detect_leaks=0 ... the all-day audio daemon otherwise has no
    # automated leak gate — unproven either way. eth-asan.yml runs the daemon with detect_leaks=0,
    # and the two DoS soaks (abuse-test.sh / conn-flood-test.sh) SIGKILL it mid-session, so a
    # daemon allocation that is never freed was UNPROVEN. LSan reports at process EXIT, which needs
    # a CLEAN exit — so this job builds an ASan (leaks-ON) harp-deviced + harp-probe + the eth-audio
    # tool via the -DHARP_ASAN=ON knob and runs scripts/lsan-drive.sh: a HARP_CLEAN_EXIT=1 daemon
    # driven through a bounded REAL session (recall save/restore + §11.3 CAS + §9.6 txn, §9 events,
    # a short RTP render, a §14.4 diag bundle, two connect/disconnect cycles) then SIGTERMed. The
    # DAEMON runs with ASAN_OPTIONS=detect_leaks=1; a leak makes its clean exit non-zero AND prints
    # a LeakSanitizer report — either fails the drive. The throwaway CLI tools run detect_leaks=0
    # (they exit-leak CLI scratch, irrelevant to "does the daemon leak" — the same rationale
    # abuse-test.sh already documents) while keeping FULL ASan memory-error checking. Linux-only:
    # LSan does not RUN on macOS (eth-asan.yml documents that arm64e ASan artifact) — this Ubuntu
    # job is the oracle. Separate from eth-asan.yml on purpose: that soak intentionally SIGKILLs and
    # must keep detect_leaks=0; this is the NEW, clean-exit path where leaks are ON.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: install libsamplerate + libusb (the §8.7 eth-audio tool + probe transport deps)
        run: sudo apt-get update && sudo apt-get install -y libsamplerate0-dev libusb-1.0-0-dev
      - name: build harp-deviced + harp-probe + eth-rtp tool (ASan, leaks ON via -DHARP_ASAN=ON)
        # -DHARP_ASAN=ON is a plain -fsanitize=address build (CMakeLists.txt); leak detection is a
        # RUNTIME option the drive sets per-process, not a build flag — so nothing here sets
        # detect_leaks. The eth-rtp tool exercises the daemon's audio_loop/engine/RTP alloc paths.
        run: |
          cmake -B build-lsan -S . -DHARP_ASAN=ON
          cmake --build build-lsan --target harp-deviced harp-probe harp-eth-rtp-test -j
      - name: LSan clean-exit daemon drive (daemon detect_leaks=1; ANY retained-at-exit alloc fails)
        # The gate. The drive defaults its binaries to ./build-lsan/* (built above), starts the
        # daemon with detect_leaks=1, drives the bounded real session, clean-exits it, and asserts
        # BOTH a rc-0 shutdown AND no "LeakSanitizer: detected memory leaks" line. A real daemon
        # leak fails this step. LSAN_OPTIONS picks up .lsan-suppressions.txt if present (none today).
        run: ./scripts/lsan-drive.sh

  cert-harness:
    # §17.3 T1–T17 CERTIFICATION HARNESS (cloud subset). Although the individual conformance
    # tests exist and run, NO single runner otherwise indexes the
    # T1–T17 battery by number, runs the cloud-capable subset, and emits one pass/fail/skip/
    # uncovered report. scripts/cert-harness.sh is that runner; scripts/cert-tests.tsv is the
    # T → §17.3-title → covering-test index (honestly classified cloud|partial|rig|uncovered).
    #
    # This job builds the CLOUD stack (a localhost harp-deviced + probe + shell + host over
    # TCP/RTP — exactly what eth.yml runs on GitHub-hosted runners, no physical rig) and runs
    # the harness. It is a REPORT + a gate on the cloud subset: it fails the build ONLY on a
    # genuine cloud-test FAIL. Rig-only T's (real USB unplug/replug, sleep/wake, power loss,
    # chained hubs, 24 h soak, multi-device-at-scale) SKIP with a logged reason — they run in
    # hw.yml + soak.yml when the self-hosted rig is online (HARP_RIG_ONLINE=1). Genuinely
    # uncovered T's (T3 sleep/wake, T7 chained hubs, T10 power loss) are listed explicitly,
    # never faked, and do NOT fail the build. The exhaustive per-OS conformance run stays in
    # eth.yml; this is the single indexed T1–T17 view + a Linux cloud gate.
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: clone VST3 SDK
        run: git clone --depth 1 --recursive
             https://github.com/steinbergmedia/vst3sdk.git external/vst3sdk
      - name: clone CLAP SDK (header-only)
        run: git clone --depth 1 --branch 1.2.8
             https://github.com/free-audio/clap.git external/clap
      - name: install deps (libusb + libsamplerate + cbor2)
        run: |
          sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libsamplerate0-dev
          # cbor2: some §8.7 sub-scripts (eth-tests / diag counters) decode the diag bundle with it.
          python3 -m pip install cbor2 || python3 -m pip install --break-system-packages cbor2
      - name: build device + eth tools + unit suite (root tree)
        # The default `cmake --build build` builds harp-deviced, harp-probe, the fence/latefr eth
        # tools, harp-engine-golden, AND every unit-test target the harness runs via ctest
        # (core / freerun / rtp / engine_logic / param_map_hash) — so `ctest -R` actually RUNS them.
        run: |
          cmake -B build -S .
          cmake --build build -j
      - name: build shell + host + clap-host (the audio-render cloud tests)
        run: |
          cmake -B build-vst -S tools/vst3-host
          cmake --build build-vst --target harp-vst3-host harp-shell harp-clap clap-host -j
      - name: T1–T17 conformance harness (cloud subset) + report
        # pipefail so a genuine cloud FAIL is not masked by tee's exit 0. SKIP/UNCOVERED never fail.
        run: |
          set -o pipefail
          scripts/cert-harness.sh | tee cert-report.txt
      - name: upload the T1–T17 certification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cert-report-t1-t17
          path: cert-report.txt
          if-no-files-found: warn
